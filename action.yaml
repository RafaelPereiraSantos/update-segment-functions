
name: 'update-segment-functions'
description: 'Updates all Segment functions defined in the config file.'
inputs:
  authorization-token:
    description: 'Segment authentication token'
    required: true
  github-token:
    description: 'GitHub token used to checkout the PR branch'
    required: true
  configuration-file-path:
    description: 'Path to the configuration file of your Segment functions'
    required: false
    default: 'config.yaml'

runs:
  using: 'composite'
  steps:
    - name: Resolve PR head SHA
      run: |
        PR_NUMBER=${{ github.event.issue.number }}
        PR_JSON=$(curl -s \
          -H "Authorization: Bearer ${{ inputs.github-token }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}")

        PR_HEAD_SHA=$(echo "$PR_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['head']['sha'])")

        if [ -z "$PR_HEAD_SHA" ] || [ "$PR_HEAD_SHA" = "None" ]; then
          echo "Error: could not resolve PR head SHA for PR #${PR_NUMBER}."
          exit 1
        fi

        echo "PR head SHA: ${PR_HEAD_SHA}"
        echo "PR_HEAD_SHA=${PR_HEAD_SHA}" >> $GITHUB_ENV
      shell: bash

    - name: Checkout PR head
      uses: actions/checkout@v4
      with:
        ref: ${{ env.PR_HEAD_SHA }}
        token: ${{ inputs.github-token }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system CA certificates
      run: |
        if [ -f /etc/os-release ]; then
          . /etc/os-release
          if [ "$ID" = "ubuntu" ] || [ "$ID" = "debian" ]; then
            sudo apt-get update
            sudo apt-get install -y ca-certificates
            sudo update-ca-certificates
          fi
        fi
      shell: bash

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -e ${{ github.action_path }}
      shell: bash

    - name: Set SSL Certificate Environment Variables
      run: |
        CERT_PATH=$(python -c "import certifi; print(certifi.where())")

        if [ ! -f "$CERT_PATH" ]; then
          echo "Resolved certificate bundle does not exist: $CERT_PATH"
          exit 1
        fi

        echo "REQUESTS_CA_BUNDLE=$CERT_PATH" >> $GITHUB_ENV
        echo "SSL_CERT_FILE=$CERT_PATH" >> $GITHUB_ENV
        echo "CURL_CA_BUNDLE=$CERT_PATH" >> $GITHUB_ENV
        echo "Certificate path resolved: $CERT_PATH"
      shell: bash

    - name: Verify SSL certificate configuration
      run: |
        python - <<'PY'
        import os
        import requests

        cert_path = os.environ.get('REQUESTS_CA_BUNDLE') or os.environ.get('SSL_CERT_FILE')
        if not cert_path or not os.path.isfile(cert_path):
            raise SystemExit(f"Certificate file is not accessible: {cert_path}")

        response = requests.get('https://api.segmentapis.com', timeout=10)
        print(f"SSL test passed with status: {response.status_code}")
        PY
      shell: bash

    - name: Run main script
      run: update-segment-functions
      shell: bash
      env:
        SEGMENT_TOKEN: ${{ inputs.authorization-token }}
        CONFIGURATION_FILE_PATH: ${{ inputs.configuration-file-path }}
